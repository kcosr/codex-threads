# Global defaults for new threads. Follow-up `send` commands keep the
# thread's existing app-server settings unless --model or --effort is passed.
model = "gpt-5.5"
model_reasoning_effort = "high"

[servers.main]
endpoint = "unix:///path/to/codex.sock"

# Optional per-server overrides.
# [servers.work]
# endpoint = "ws://127.0.0.1:8765"
# auth_token_env = "CODEX_APP_SERVER_TOKEN"
# model = "gpt-5.5"
# model_reasoning_effort = "low"
